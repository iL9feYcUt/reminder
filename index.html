<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学習管理アプリ</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  background: #f5f5f5;
}

header {
  display: flex;
  justify-content: space-around;
  background: #fff;
  border-bottom: 1px solid #ccc;
}

.subtabs { display:flex; gap:8px; margin-bottom:8px; }
.subtab { padding:6px 10px; cursor:pointer; background:#f3f3f3; border-radius:6px; }
.subtab.active { background:#007bff; color:#fff; }

.tab {
  padding: 12px;
  cursor: pointer;
}

.active {
  border-bottom: 2px solid blue;
}

.container {
  padding: 10px;
}

.card {
  background: white;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 8px;
}

.completed {
  opacity: 0.4;
}

.tag {
  font-size: 12px;
  padding: 2px 6px;
  border-radius: 6px;
  margin-left: 6px;
}

.preview { background: #d0ebff; }
.review { background: #ffd6d6; }

button {
  margin-top: 5px;
}

/* Form styling */
.card input, .card select, .card button, .card textarea {
  margin: 6px 4px 0 0;
}

/* Calendar table */
.calendar-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.calendar-table th, .calendar-table td { border: 1px solid #e0e0e0; vertical-align: top; padding: 6px; height: 100px; overflow: hidden; word-wrap: break-word; }
.calendar-table th { background: #fafafa; }
.calendar-day-number { font-weight: bold; margin-bottom: 4px; }
.calendar-holiday { color: #c00; font-weight: bold; }
.calendar-empty { background: #f9f9f9; color: #aaa; }

.weekly-table { width: 100%; border-collapse: collapse; margin-bottom: 8px; table-layout: fixed; }
.weekly-table th, .weekly-table td { border: 1px solid #eaeaea; padding:6px; vertical-align: top; overflow: hidden; word-wrap: break-word; }
.weekly-table th { background:#f8f8f8; }
.weekly-table th:first-child { width: 60px; }

/* Reminder card UI */
.reminder-header { display:flex; align-items:center; gap:8px; }
.reminder-actions { margin-left: auto; display:flex; gap:6px; }
.reminder-textarea { width:100%; box-sizing:border-box; min-height:64px; margin-top:6px; }
.reminder-input { width:60%; }
.reminder-header input[type="checkbox"] { flex: 0 0 28px; width:18px; height:18px; }
.reminder-header > div { min-width:0; }
.icon-edit { width:32px; height:32px; display:inline-flex; align-items:center; justify-content:center; border-radius:6px; border:1px solid transparent; background:transparent; cursor:pointer; }
.icon-edit svg { width:16px; height:16px; }
.btn-danger { background:#dc3545; color:#fff; border:none; padding:6px 8px; border-radius:4px; }
.btn-primary { background:#007bff; color:#fff; border:none; padding:6px 8px; border-radius:4px; }

/* Modal for editing a day */
.modal {
  position: fixed;
  left: 0; top: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
}
.modal .card { width: 90%; max-width: 600px; max-height: 80%; overflow:auto; }
.small-btn { font-size:12px; padding:4px 6px; margin-left:6px; }

.icon-btn { width:16px; height:16px; display:inline-flex; align-items:center; justify-content:center; padding:0; border-radius:4px; border:1px solid #ddd; background:transparent; cursor:pointer; }
.icon-btn svg { width:10px; height:10px; display:block; }

/* Floating add button */
.fab {
  position: fixed;
  left: 12px;
  bottom: 12px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: #007bff;
  color: #fff;
  border: none;
  font-size: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  z-index: 30;
}

/* Responsive */
@media (max-width: 480px) {
  header { font-size: 14px; }
  .card { padding: 8px; }
  .card input, .card select { width: 100%; box-sizing: border-box; }
  /* smaller calendar text on small screens */
  .calendar-table td, .calendar-table th { font-size: 12px; padding:4px; }
  .calendar-day-number { font-size: 12px; }
  .weekly-table th { font-size: 12px; padding:4px; }
  .weekly-table td { font-size: 9px; padding:4px; }
  .weekly-table th:first-child { width: 20px; }
}
</style>
</head>

<body>

<header>
  <div class="tab active" onclick="switchTab('reminder', this)">リマインダー</div>
  <div class="tab" onclick="switchTab('calendar', this)">カレンダー</div>
</header>

<!-- ログイン画面（別画面） -->
<div id="login_page" class="modal" style="display:none;z-index:100">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h3>ログイン / 登録</h3>
      <button onclick="closeLoginPage()">閉じる</button>
    </div>
    <div style="margin-top:8px">
      <div>メールアドレス<br><input id="login_email" style="width:100%"></div>
      <div>パスワード<br><input id="login_password" type="password" style="width:100%"></div>
      <div style="margin-top:8px;display:flex;gap:8px">
        <button onclick="loginWithPassword()">ログイン</button>
        <button onclick="signupWithPassword()">登録</button>
      </div>
      <div style="margin-top:8px;font-size:12px;color:#666">開発中は確認メールが必要な場合があります。登録後にメールを確認してください。</div>
    </div>
  </div>
</div>

<div id="reminder" class="container">
  <div class="card">
    <button id="gen_now_btn" onclick="runGenerateNow()">今すぐリマインダー生成</button>
    <label style="margin-left:8px"><input id="auto_generate_chk" type="checkbox" onchange="toggleAutoGenerate(this.checked)"> 自動生成</label>
    <input id="auto_interval" type="number" min="1" value="60" style="width:80px;margin-left:6px"> 分ごと
    <span id="gen_status" style="margin-left:12px;color:#444"></span>
  </div>

  <div id="reminder_list"></div>
</div>
<div id="calendar" class="container" style="display:none">
  <div id="calendar_admin" style="display:none">
  <div class="card">
    <b>授業期間登録</b>
    <div>
      <input id="term_name" placeholder="名称">
      <input id="term_start" type="date">
      <input id="term_end" type="date">
      <button onclick="addTerm()">追加</button>
    </div>
  </div>

  <div class="card">
    <b>休講日登録</b>
    <div>
      <input id="holiday_date" type="date">
      <input id="holiday_reason" placeholder="理由">
      <button onclick="addHoliday()">追加</button>
    </div>
  </div>

  <div class="card">
    <b>通常時間割（週次）登録</b>
    <div>
      <label>曜日</label>
      <select id="weekly_day">
        <option value="0">日</option>
        <option value="1">月</option>
        <option value="2">火</option>
        <option value="3">水</option>
        <option value="4">木</option>
        <option value="5">金</option>
        <option value="6">土</option>
      </select>
      <input id="weekly_period" type="number" placeholder="限（例:1）" min="1">
      <input id="weekly_subject" placeholder="科目">
      <input id="weekly_start" type="time">
      <input id="weekly_end" type="time">
      <button onclick="addWeekly()">追加</button>
    </div>
  </div>

  <div class="card">
    <b>特別時間割（日付指定）登録</b>
    <div>
      <input id="special_date" type="date">
      <input id="special_period" type="number" placeholder="限" min="1">
      <input id="special_subject" placeholder="科目">
      <input id="special_start" type="time">
      <input id="special_end" type="time">
      <button onclick="addSpecial()">追加</button>
    </div>
  </div>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <div>
        <button onclick="changeMonth(-1)">&lt;</button>
        <button onclick="changeMonth(1)">&gt;</button>
      </div>
      <div id="calendar_label"></div>
      <div>
        <button onclick="toggleAdmin()">設定</button>
      </div>
    </div>

    <div class="subtabs">
      <div id="subtab_calendar" class="subtab active" onclick="switchCalendarView('calendar')">月カレンダー</div>
      <div id="subtab_timetable" class="subtab" onclick="switchCalendarView('timetable')">時間割表</div>
    </div>

    <div id="calendar_view">
      <div id="calendar_days"></div>
    </div>

    <div id="timetable_view" style="display:none">
      <div id="weekly_table" style="margin-bottom:8px"></div>
    </div>
  </div>
</div>

  <!-- Add reminder floating button and modal -->
  <button id="add_reminder_btn" class="fab" onclick="openAddReminder()">＋</button>

  <div id="add_reminder_modal" class="modal" style="display:none">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h3>リマインダー追加</h3>
        <button onclick="closeAddReminder()">閉じる</button>
      </div>
      <div>
        <div>タイトル<br><input id="add_title" style="width:100%"></div>
        <div>科目（任意）<br><input id="add_subject" style="width:100%"></div>
        <div>種別<br>
          <select id="add_type">
            <option value="preview">予習</option>
            <option value="review">復習</option>
          </select>
        </div>
        <div>期限（日時）<br><input id="add_due" type="datetime-local" style="width:100%"></div>
        <div>メモ<br><textarea id="add_memo" style="width:100%"></textarea></div>
        <div style="margin-top:8px">
          <button id="modal_save_btn" onclick="submitAddReminder()">追加</button>
          <button id="modal_delete_btn" class="btn-danger" style="display:none;margin-left:8px" onclick="deleteReminderFromModal()">削除</button>
        </div>
      </div>
    </div>
  </div>

<script>
const SUPABASE_URL = "https://ipcgecwqswavxozmelku.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwY2dlY3dxc3dhdnhvem1lbGt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NTUzODUsImV4cCI6MjA5MjQzMTM4NX0.xIQPpVAWItAwhbACjA602MXvVPhx9yV52G3sAEXzWq0";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentTab = "reminder";

// --- Auth helpers and login page control ---
async function initAuth() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  // close login modal if already authenticated
  if (session && session.user) closeLoginPage();
  else openLoginPage();
  supabaseClient.auth.onAuthStateChange((_event, session) => {
    if (session && session.user) closeLoginPage();
  });
}

function openLoginPage() {
  const el = document.getElementById('login_page'); if (!el) return; el.style.display = 'flex';
}

function closeLoginPage() { const el = document.getElementById('login_page'); if (!el) return; el.style.display = 'none'; }

async function loginWithPassword() {
  const email = document.getElementById('login_email').value.trim();
  const password = document.getElementById('login_password').value;
  if (!email || !password) { alert('メールとパスワードを入力してください'); return; }
  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if (error) { alert('ログインエラー: ' + error.message); return; }
  closeLoginPage();
}

async function signupWithPassword() {
  const email = document.getElementById('login_email').value.trim();
  const password = document.getElementById('login_password').value;
  if (!email || !password) { alert('メールとパスワードを入力してください'); return; }
  const { data, error } = await supabaseClient.auth.signUp({ email, password });
  if (error) { alert('登録エラー: ' + error.message); return; }
  if (!data || !data.user) {
    alert('登録処理を受け付けました。確認メールを送信しました。メール内のリンクで有効化してください。');
  } else {
    alert('登録完了しました。');
    closeLoginPage();
  }
}

async function signOutUser() { await supabaseClient.auth.signOut(); }

async function ensureLoggedIn() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session || !session.user) { openLoginPage(); return false; }
  return true;
}

function switchTab(tab, el) {
  document.getElementById("reminder").style.display = "none";
  document.getElementById("calendar").style.display = "none";

  document.getElementById(tab).style.display = "block";

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  if (el && el.classList) el.classList.add("active");

  currentTab = tab;

  if (tab === "reminder") loadReminders();
  if (tab === "calendar") loadCalendar();
}

function switchCalendarView(view) {
  const cal = document.getElementById('calendar_view');
  const tim = document.getElementById('timetable_view');
  const sc = document.getElementById('subtab_calendar');
  const st = document.getElementById('subtab_timetable');
  if (!cal || !tim || !sc || !st) return;
  if (view === 'timetable') {
    cal.style.display = 'none';
    tim.style.display = 'block';
    sc.classList.remove('active'); st.classList.add('active');
  } else {
    cal.style.display = 'block';
    tim.style.display = 'none';
    st.classList.remove('active'); sc.classList.add('active');
  }
}

async function generateReminders() {
  if (!await ensureLoggedIn()) return;
  return await supabaseClient.rpc("generate_reminders");
}

async function loadReminders() {
  // Hide completed reminders that are past due by marking hidden=true
  try {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session && session.user) {
      await supabaseClient.from('reminders')
        .update({ hidden: true })
        .lt('due_date', new Date().toISOString())
        .eq('completed', true)
        .eq('hidden', false);
    }
  } catch (e) {
    console.error('failed to mark expired completed as hidden', e);
  }

  const { data } = await supabaseClient
    .from("reminders")
    .select("*")
    .neq('hidden', true)
    .order("due_date", { ascending: true });

  const container = document.getElementById("reminder_list");
  container.innerHTML = "";

  const now = new Date();

  data.forEach(r => {
    if (new Date(r.due_date) < now && r.completed) return;

    const div = document.createElement("div");
    div.className = "card " + (r.completed ? "completed" : "");
    const tag = `<span class="tag ${r.type}">${r.type === "preview" ? "予習" : "復習"}</span>`;

    div.innerHTML = `
      <div class="reminder-header">
        <input type="checkbox" ${r.completed ? "checked" : ""} onchange="toggleComplete('${r.id}', this.checked)">
        <div id="title_view_${r.id}" style="flex:1;min-width:0;">
          <span id="title_text_${r.id}">${escapeHtml(r.title)}</span>
          ${tag}
          <input id="title_input_${r.id}" class="reminder-input" style="display:none;" value="${escapeHtml(r.title)}">
        </div>
        <div class="reminder-actions">
          <button class="icon-edit" aria-label="編集" onclick="openReminderEdit('${r.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
          </button>
        </div>
      </div>
      <div><small>${new Date(r.due_date).toLocaleString()}</small></div>
      <div>
        <div id="memo_view_${r.id}">${escapeHtml(r.memo || '')}</div>
      </div>
    `;

    container.appendChild(div);
  });
}

function escapeHtml(text) {
  if (!text) return '';
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

async function saveTitle(id) {
  if (!await ensureLoggedIn()) return;
  const el = document.getElementById('title_input_' + id);
  if (!el) return;
  const title = el.value.trim();
  if (!title) { alert('タイトルは必須です'); return; }
  await supabaseClient.from('reminders').update({ title }).eq('id', id);
  // update UI
  document.getElementById('title_text_' + id).textContent = title;
  cancelEdit(id);
}

async function saveMemo(id) {
  if (!await ensureLoggedIn()) return;
  const el = document.getElementById('memo_input_' + id);
  if (!el) return;
  const memo = el.value;
  await supabaseClient.from('reminders').update({ memo }).eq('id', id);
  document.getElementById('memo_view_' + id).textContent = memo;
  cancelMemoEdit(id);
}

function enableEdit(id) {
  document.getElementById('title_text_' + id).style.display = 'none';
  document.getElementById('title_input_' + id).style.display = 'inline-block';
  document.getElementById('edit_btn_' + id).style.display = 'none';
  document.getElementById('save_btn_' + id).style.display = 'inline-block';
  document.getElementById('cancel_btn_' + id).style.display = 'inline-block';
}

function cancelEdit(id) {
  const input = document.getElementById('title_input_' + id);
  const text = document.getElementById('title_text_' + id);
  if (input && text) {
    input.value = text.textContent;
    input.style.display = 'none';
    text.style.display = 'inline';
  }
  const editBtn = document.getElementById('edit_btn_' + id);
  const saveBtn = document.getElementById('save_btn_' + id);
  const cancelBtn = document.getElementById('cancel_btn_' + id);
  if (editBtn) editBtn.style.display = 'inline-block';
  if (saveBtn) saveBtn.style.display = 'none';
  if (cancelBtn) cancelBtn.style.display = 'none';
}

function enableMemoEdit(id) {
  document.getElementById('memo_view_' + id).style.display = 'none';
  document.getElementById('memo_input_' + id).style.display = 'block';
  document.getElementById('edit_memo_btn_' + id).style.display = 'none';
  document.getElementById('save_memo_btn_' + id).style.display = 'inline-block';
  document.getElementById('cancel_memo_btn_' + id).style.display = 'inline-block';
}

function cancelMemoEdit(id) {
  const view = document.getElementById('memo_view_' + id);
  const input = document.getElementById('memo_input_' + id);
  if (view && input) {
    input.value = view.textContent;
    input.style.display = 'none';
    view.style.display = 'block';
  }
  const editBtn = document.getElementById('edit_memo_btn_' + id);
  const saveBtn = document.getElementById('save_memo_btn_' + id);
  const cancelBtn = document.getElementById('cancel_memo_btn_' + id);
  if (editBtn) editBtn.style.display = 'inline-block';
  if (saveBtn) saveBtn.style.display = 'none';
  if (cancelBtn) cancelBtn.style.display = 'none';
}

async function deleteReminder(id) {
  if (!await ensureLoggedIn()) return;
  if (!confirm('このリマインダーを削除しますか？')) return;
  const { error } = await supabaseClient.from('reminders').delete().eq('id', id);
  if (error) { alert('削除エラー: ' + error.message); return; }
  await loadReminders();
}

// --- 生成トリガー制御 ---
let autoGenIntervalId = null;

async function runGenerateNow() {
  const btn = document.getElementById('gen_now_btn');
  const status = document.getElementById('gen_status');
  btn.disabled = true;
  status.textContent = '生成中...';
  try {
    const res = await generateReminders();
    if (res && res.error) {
      status.textContent = 'エラー: ' + res.error.message;
    } else {
      const t = new Date();
      status.textContent = '最終実行: ' + t.toLocaleString();
    }
    await loadReminders();
  } catch (e) {
    status.textContent = '失敗: ' + e.message;
  } finally {
    btn.disabled = false;
  }
}

function toggleAutoGenerate(checked) {
  const status = document.getElementById('gen_status');
  if (checked) {
    const mins = parseInt(document.getElementById('auto_interval').value, 10) || 60;
    // set interval in ms
    autoGenIntervalId = setInterval(async () => {
      try { await generateReminders(); await loadReminders(); }
      catch (e) { console.error('auto generate failed', e); }
    }, mins * 60 * 1000);
    status.textContent = '自動生成: ON (' + mins + '分毎)';
  } else {
    if (autoGenIntervalId) { clearInterval(autoGenIntervalId); autoGenIntervalId = null; }
    status.textContent = '自動生成: OFF';
  }
}

async function toggleComplete(id, state) {
  if (!await ensureLoggedIn()) return;
  // update completed state
  await supabaseClient.from("reminders")
    .update({ completed: state })
    .eq("id", id);

  // if marked completed and already past due, mark hidden
  if (state) {
    const { data } = await supabaseClient.from('reminders').select('due_date').eq('id', id).single();
    if (data && data.due_date) {
      if (new Date(data.due_date) < new Date()) {
        await supabaseClient.from('reminders').update({ hidden: true }).eq('id', id);
      } else {
        await supabaseClient.from('reminders').update({ hidden: false }).eq('id', id);
      }
    }
  } else {
    // un-complete: ensure visible
    await supabaseClient.from('reminders').update({ hidden: false }).eq('id', id);
  }

  loadReminders();
}

async function updateMemo(id, memo) {
  if (!await ensureLoggedIn()) return;
  await supabaseClient.from("reminders")
    .update({ memo: memo })
    .eq("id", id);
}

async function addReminder() {
  if (!await ensureLoggedIn()) return;
  const title = prompt("タイトル");
  if (!title) return;

  await supabaseClient.from("reminders").insert({
    title: title,
    due_date: new Date().toISOString()
  });

  loadReminders();
}

// --- 管理用フォームからの追加処理 ---
async function addTerm() {
  if (!await ensureLoggedIn()) return;
  const name = document.getElementById('term_name').value.trim();
  const start_date = document.getElementById('term_start').value;
  const end_date = document.getElementById('term_end').value;
  if (!name || !start_date || !end_date) { alert('名称・開始日・終了日を入力してください'); return; }
  await supabaseClient.from('terms').insert({ name, start_date, end_date });
  alert('追加しました');
}

async function addHoliday() {
  if (!await ensureLoggedIn()) return;
  const date = document.getElementById('holiday_date').value;
  const reason = document.getElementById('holiday_reason').value.trim();
  if (!date) { alert('日付を入力してください'); return; }

let calendarState = { year: null, month: null };

function changeMonth(delta) {
  if (!calendarState.year) {
    const now = new Date();
    calendarState.year = now.getFullYear();
    calendarState.month = now.getMonth();
  }
  const d = new Date(calendarState.year, calendarState.month + delta, 1);
  calendarState.year = d.getFullYear();
  calendarState.month = d.getMonth();
  loadCalendar(calendarState.year, calendarState.month);
}

async function loadCalendar(year, month) {
  const { data: special } = await supabaseClient.from("special_schedule").select("*");
  const { data: weekly } = await supabaseClient.from("weekly_schedule").select("*");
  const { data: holidays } = await supabaseClient.from("holidays").select("*");

  const container = document.getElementById("calendar_days");
  container.innerHTML = "";

  const now = new Date();
  if (typeof year === 'undefined' || typeof month === 'undefined') {
    year = now.getFullYear();
    month = now.getMonth();
  }
  calendarState.year = year; calendarState.month = month;

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);

  document.getElementById('calendar_label').textContent = `${year}年 ${month + 1}月`;

  const table = document.createElement('table');
  table.className = 'calendar-table';
  const thead = document.createElement('thead');
  const headerRow = document.createElement('tr');
  // week starts on Monday
  ['月','火','水','木','金','土','日'].forEach(h => { const th = document.createElement('th'); th.textContent = h; headerRow.appendChild(th); });
  thead.appendChild(headerRow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');

  // compute start so week begins on Monday
  let startWeekday = (firstDay.getDay() + 6) % 7; // Monday=0..Sunday=6
  let cur = new Date(year, month, 1 - startWeekday);

  // continue until we've reached the Monday after lastDay
  while (cur <= lastDay || cur.getDay() !== 1) {
    const tr = document.createElement('tr');
    for (let i = 0; i < 7; i++) {
      const td = document.createElement('td');
      const dateStr = cur.toISOString().split('T')[0];
      const inMonth = cur.getMonth() === month;
      const dayNum = cur.getDate();

      if (!inMonth) td.classList.add('calendar-empty');

      const numDiv = document.createElement('div');
      numDiv.className = 'calendar-day-number';
      numDiv.textContent = dayNum;
      td.appendChild(numDiv);

      // holiday?
      const isHoliday = (holidays || []).find(h => h.date === dateStr);
      if (isHoliday) {
        const hdiv = document.createElement('div');
        hdiv.className = 'calendar-holiday';
        hdiv.textContent = isHoliday.reason || '休講';
        td.appendChild(hdiv);
        tr.appendChild(td);
        cur.setDate(cur.getDate() + 1);
        continue;
      }

      // special schedule first
      const specialDay = (special || []).filter(s => s.date === dateStr);
      if (specialDay.length) {
        specialDay.forEach(s => {
          const li = document.createElement('div');
          li.textContent = `${s.period}限 ${s.subject}`;
          td.appendChild(li);
        });
        // allow editing
        td.style.cursor = 'pointer';
        td.onclick = (e) => { if (e.target === td || e.target === numDiv) openDayEditor(dateStr); };
      } else {
        // Do not render weekly schedule entries in the month calendar to keep it clean.
        // Keep click handler so user can open day editor to view/edit that day's schedule.
        td.style.cursor = 'pointer';
        td.onclick = (e) => { if (e.target === td || e.target === numDiv) openDayEditor(dateStr); };
      }

      tr.appendChild(td);
      cur.setDate(cur.getDate() + 1);
    }
    tbody.appendChild(tr);
  }

  table.appendChild(tbody);
  container.appendChild(table);

  // render weekly timetable table
  renderWeeklyTable(weekly || []);
  // ensure calendar subview shown by default
  try { switchCalendarView('calendar'); } catch(e) {}
}

function renderWeeklyTable(weekly) {
  const container = document.getElementById('weekly_table');
  container.innerHTML = '';
  if (!weekly || weekly.length === 0) {
    container.innerHTML = '<div class="card">通常時間割は未登録です</div>';
    return;
  }

  // determine max period
  let maxPeriod = 0;
  weekly.forEach(w => { if (w.period && w.period > maxPeriod) maxPeriod = w.period; });
  if (maxPeriod === 0) maxPeriod = 6;

  // columns: Monday..Sunday
  const days = ['月','火','水','木','金'];
  const table = document.createElement('table');
  table.className = 'weekly-table';
  const thead = document.createElement('thead');
  const htr = document.createElement('tr');
  htr.appendChild(document.createElement('th'));
  days.forEach(d => { const th = document.createElement('th'); th.textContent = d; htr.appendChild(th); });
  thead.appendChild(htr);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  for (let p = 1; p <= maxPeriod; p++) {
    const tr = document.createElement('tr');
    const th = document.createElement('th'); th.textContent = p ; tr.appendChild(th);
    for (let col = 0; col < 5; col++) {
      const td = document.createElement('td');
      // map column (0=Mon) back to week day number where 0=Sun..6=Sat
      const dow = (col + 1) % 7;
      const cells = weekly.filter(w => w.day_of_week === dow && w.period === p);
      if (cells.length) {
        cells.forEach(c => {
          const div = document.createElement('div');
          div.textContent = c.subject;
          // action buttons: edit / delete
          const editBtn = document.createElement('button'); editBtn.className = 'icon-btn'; editBtn.setAttribute('aria-label','編集');
          editBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>';
          editBtn.onclick = (e) => { e.stopPropagation(); openWeeklyEdit(c.id); };
          const delBtn = document.createElement('button'); delBtn.className = 'icon-btn'; delBtn.setAttribute('aria-label','削除');
          delBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>';
          delBtn.onclick = (e) => { e.stopPropagation(); deleteWeekly(c.id); };
          const actions = document.createElement('div');
          actions.style.marginTop = '0px';
          actions.appendChild(editBtn); actions.appendChild(delBtn);
          td.appendChild(div);
          td.appendChild(actions);
        });
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }

  table.appendChild(tbody);
  container.appendChild(table);
}

async function submitAddReminder() {
  if (!await ensureLoggedIn()) return;
  const title = document.getElementById('add_title').value.trim();
  if (!title) { alert('タイトルを入力してください'); return; }
  const subject = document.getElementById('add_subject').value.trim() || null;
  const type = document.getElementById('add_type').value;
  const dueVal = document.getElementById('add_due').value;
  const memo = document.getElementById('add_memo').value || null;

  let due_date = new Date().toISOString();
  if (dueVal) {
    try { due_date = new Date(dueVal).toISOString(); } catch(e) { due_date = new Date().toISOString(); }
  }

  const modal = document.getElementById('add_reminder_modal');
  const editId = modal && modal.dataset ? modal.dataset.editId : null;
  if (editId) {
    const { error } = await supabaseClient.from('reminders').update({ title, subject, type, due_date, memo }).eq('id', editId);
    if (error) { alert('保存に失敗しました: ' + error.message); return; }
  } else {
    const { error } = await supabaseClient.from('reminders').insert({ title, subject, type, due_date, memo });
    if (error) { alert('保存に失敗しました: ' + error.message); return; }
  }
  closeAddReminder();
  await loadReminders();
}

initAuth();
loadReminders();
</script>
